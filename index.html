<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc.PUG CRM - Преміум Панель</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span>🐾</span>
                <span>Doc.PUG <span style="color: var(--accent-color); font-size: 0.8rem; block-size: min-content;">CRM</span></span>
            </div>
            
            <div class="user-profile-badge">
                <h4>Doc.PUG Clinic</h4>
                <span>Адміністратор</span>
            </div>
            
            <nav style="flex-grow: 1;">
                <ul class="sidebar-menu" id="tabs">
                    <li class="menu-item" data-target="calendar">
                        <a href="#calendar">📅 Календарь</a>
                    </li>
                    <li class="menu-item active" data-target="owners">
                        <a href="#owners">👥 Власники</a>
                    </li>
                    <li class="menu-item" data-target="patients">
                        <a href="#patients">🐾 Пацієнти</a>
                    </li>
                    <li class="menu-item" data-target="visits">
                        <a href="#visits">📝 Візити</a>
                    </li>
                    <li class="menu-item" data-target="services">
                        <a href="#services">💼 Послуги</a>
                    </li>
                    <li class="menu-item" data-target="warehouse">
                        <a href="#warehouse">📦 Склад</a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            
            <header class="header-panel">
                <div class="search-bar">
                    <input type="text" id="globalSearch" placeholder="Пошук власника, пацієнта, телефону...">
                </div>
            </header>

            <section class="page content-section" data-page="owners">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2>Власники тварин</h2>
                    <button class="btn-primary" id="btnAddOwner">+ Додати власника</button>
                </div>
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ПІБ</th>
                                <th>Телефон</th>
                                <th>Email/Статус</th>
                                <th>Адреса</th>
                                <th>Дії</th>
                            </tr>
                        </thead>
                        <tbody id="owners-table-body">
                            </tbody>
                    </table>
                </div>
                <div id="ownersList" style="display:none;"></div>
            </section>

            <section class="page content-section" data-page="owner" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div>
                        <div id="ownerName" style="font-size: 1.5rem; font-weight: 700; color: #fff;">Власник</div>
                        <div id="ownerMeta" style="font-size: 0.9rem; color: var(--text-muted); margin-top: 4px;">—</div>
                    </div>
                    <button class="btn-tab" id="btnBackOwners">&larr; До списку</button>
                </div>
                
                <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 style="color: #fff; font-size: 1.2rem;">🐾 Пацієнти цього власника</h3>
                    <button class="btn-primary" id="btnAddPet">+ Додати тварину</button>
                </div>
                <div class="patients-grid" id="petsList">
                    </div>
            </section>

            <section class="page content-section" data-page="patient" style="display: none;">
                <button class="btn-tab" id="btnBackPatient" style="margin-bottom: 20px;">&larr; Назад до профілю</button>
                <div id="patientCardRoot"></div>
            </section>

            <section class="page content-section" data-page="calendar" style="display: none;">
                <div id="calendar-grid-target"></div>
            </section>

            <section class="page content-section" data-page="patients" style="display: none;"></section>
            <section class="page content-section" data-page="visit" style="display: none;"></section>
            <section class="page content-section" data-page="visits" style="display: none;"></section>
            <section class="page content-section" data-page="services" style="display: none;"></section>
            <section class="page content-section" data-page="stock" style="display: none;"></section>

        </main>
    </div>

    <div class="modal modal-overlay" id="visitModal" aria-hidden="true" style="display:none;">
        <div class="modal__panel modal-window" role="dialog" aria-modal="true" style="background: rgba(25, 15, 40, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1);">
            <div class="modal__head" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div>
                    <div class="modal__title" style="font-size:1.3rem; font-weight:700; color:#fff;">Новий запис прийому</div>
                    <div class="modal__sub" id="visitModalSub" style="font-size:0.85rem; color:var(--text-muted);">Пацієнт: —</div>
                </div>
                <button class="iconBtn" id="visitClose" style="background:none; border:none; color:#fff; font-size:1.2rem; cursor:pointer;">✕</button>
            </div>

            <div class="modal__body" style="display:flex; flex-direction:column; gap:14px; max-height:70vh; overflow-y:auto; padding-right:10px;">
                <div id="visitPatientBlock" style="display:none;">
                    <label class="field">
                        <div class="label" style="color:#fff; margin-bottom:6px; font-size:0.85rem;">Пацієнт</div>
                        <input class="form-input" id="visitPatientSearch" placeholder="Пошук: пацієнт, власник, телефон..." autocomplete="off">
                        <input id="visitPatientSelect" type="hidden">
                        <div id="visitPatientResults" class="patientSearchResults" style="margin-top:4px;"></div>
                    </label>
                    <button class="btn-tab" id="btnCreatePatientFromVisit" type="button" style="margin: 10px 0;">+ Новий пацієнт</button>
                </div>

                <label class="field">
                    <div class="label" style="color:#fff; margin-bottom:6px;">Дата</div>
                    <input class="form-input" id="visitDate" type="date">
                </label>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <label class="field">
                        <div class="label" style="color:#fff; margin-bottom:6px;">Час початку</div>
                        <input class="form-input" id="visitStartTime" type="time" value="10:00">
                    </label>
                    <label class="field">
                        <div class="label" style="color:#fff; margin-bottom:6px;">Тривалість</div>
                        <select class="form-input" id="visitDuration">
                            <option value="30">30 хв</option>
                            <option value="60" selected>60 хв</option>
                            <option value="90">90 хв</option>
                        </select>
                    </label>
                </div>

                <label class="field">
                    <div class="label" style="color:#fff; margin-bottom:6px;">Ветеринар</div>
                    <select class="form-input" id="visitStaff">
                        <option value="">Оберіть ветеринара</option>
                    </select>
                </label>

                <label class="field">
                    <div class="label" style="color:#fff; margin-bottom:6px;">Скарги / анамнез</div>
                    <textarea class="form-input" id="visitNote" rows="3" placeholder="Опишіть стан..."></textarea>
                </label>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <label class="field">
                        <div class="label" style="color:#fff; margin-bottom:6px;">Діагноз</div>
                        <input class="form-input" id="visitDx" placeholder="Риніт">
                    </label>
                    <label class="field">
                        <div class="label" style="color:#fff; margin-bottom:6px;">Вага (кг)</div>
                        <input class="form-input" id="visitWeight" placeholder="4.5">
                    </label>
                </div>

                <label class="field">
                    <div class="label" style="color:#fff; margin-bottom:6px;">Призначення лікаря</div>
                    <textarea class="form-input" id="visitRx" rows="3" placeholder="Препарат, доза..."></textarea>
                </label>
            </div>

            <div class="modal__foot" style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px; border-top:1px solid rgba(255,255,255,0.08); padding-top:14px;">
                <button class="btn-tab" id="visitCancel">Скасувати</button>
                <button class="btn-primary" id="visitSave">Зберегти візит</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
